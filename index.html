<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bevy Quick Action HUD — FPS Demo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Loading overlay ─────────────────────────────────────────────── */

    #loading {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading .logo {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }

    #loading .logo small {
      display: block;
      font-size: 0.9rem;
      font-weight: 400;
      opacity: 0.6;
      margin-top: 0.25rem;
    }

    /* ── Progress bar ────────────────────────────────────────────────── */

    .progress-wrap {
      width: 280px;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      margin: 1rem 0 0.75rem;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #6c63ff, #a78bfa);
      transition: width 0.2s ease;
    }

    #loading .status {
      font-size: 0.85rem;
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">
      🎮
      <small>Bevy Quick Action HUD</small>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <p class="status" id="status-text">Loading…</p>
  </div>

  <!--
    Intercept fetch() calls for .wasm files to track real download progress.
    This <script> runs BEFORE the Trunk module script so the override is
    installed before wasm-bindgen starts loading the WASM binary.
  -->
  <script>
    (function() {
      var originalFetch = window.fetch;
      var progressBar = document.getElementById('progress-bar');
      var statusText = document.getElementById('status-text');

      window.fetch = function(input, init) {
        var url = (typeof input === 'string' ? input : input.url) || '';
        if (url.indexOf('.wasm') === -1) {
          return originalFetch.call(window, input, init);
        }

        statusText.textContent = 'Downloading WASM binary…';

        return originalFetch.call(window, input, init).then(function(response) {
          if (!response.ok || !response.body) return response;

          var contentLength = parseInt(
            response.headers.get('Content-Length') || '0', 10
          );
          if (!contentLength) return response;

          var loaded = 0;
          var reader = response.body.getReader();
          var stream = new ReadableStream({
            start: function(controller) {
              function push() {
                reader.read().then(function(result) {
                  if (result.done) {
                    controller.close();
                    progressBar.style.width = '100%';
                    statusText.textContent = 'Starting Bevy…';
                    return;
                  }
                  loaded += result.value.length;
                  var pct = Math.min((loaded / contentLength) * 100, 100);
                  progressBar.style.width = pct.toFixed(1) + '%';
                  controller.enqueue(result.value);
                  push();
                });
              }
              push();
            }
          });

          return new Response(stream, {
            headers: response.headers,
            status: response.status,
            statusText: response.statusText,
          });
        });
      };

      // Watch for the Bevy canvas appearing in the DOM.
      // Bevy/winit creates a <canvas> once it's ready to render.
      var target = document.body || document.documentElement;
      var observer = new MutationObserver(function() {
        if (document.querySelector('canvas')) {
          observer.disconnect();
          window.fetch = originalFetch;
          statusText.textContent = 'Ready!';
          requestAnimationFrame(function() {
            document.getElementById('loading').classList.add('hidden');
          });
        }
      });
      observer.observe(target, { childList: true, subtree: true });

      // Safety net: hide loading after 30 s no matter what
      setTimeout(function() {
        observer.disconnect();
        window.fetch = originalFetch;
        document.getElementById('loading').classList.add('hidden');
      }, 30000);
    })();
  </script>

  <!-- Trunk compiles examples/fps.rs and injects the WASM loader -->
  <link data-trunk rel="rust" data-path="examples/fps.rs" />
</body>
</html>
