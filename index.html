<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bevy Quick Action HUD — FPS Demo</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    /* Loading screen shown while WASM is booting */
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      z-index: 9999;
    }
    #loading .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.1);
      border-top-color: #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p {
      font-size: 1.1rem;
      opacity: 0.8;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading Bevy application…</p>
  </div>

  <!-- Trunk will compile examples/fps.rs and inject the WASM loader -->
  <link data-trunk rel="rust" data-path="examples/fps.rs" />

  <script>
    // Hide loading screen once the WASM is ready
    window.addEventListener('load', () => {
      const loading = document.getElementById('loading');
      if (loading) {
        // Give Bevy a moment to initialise its canvas, then hide the overlay
        setTimeout(() => loading.classList.add('hidden'), 500);
      }
    });
    // Fallback: hide after 10 s no matter what
    setTimeout(() => {
      const el = document.getElementById('loading');
      if (el) el.classList.add('hidden');
    }, 10000);
  </script>
</body>
</html>
