[build]
# The HTML file that drives the bundling process
target = "index.html"
# Release builds are smaller and faster — use --release in CI
# Local dev can omit --release for faster rebuilds
release = false

# All icons and shaders are embedded at compile time via embedded_asset!()
# No external assets directory is needed.
#

[serve]
# Port for `trunk serve`
port = 8080
# Listen on all interfaces so it works in dev containers / remote hosts
addresses = ["0.0.0.0"]
# Open a browser tab automatically
open = false

[[headers]]
# Set WASM content-type so browsers load the binary correctly
pattern = "*.wasm"
value = { Content-Type = "application/wasm" }

[[headers]]
# Aggressively cache static assets in production
pattern = "*.{js,css,wasm}"
value = { Cache-Control = "public, max-age=31536000, immutable" }
