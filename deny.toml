# cargo-deny configuration
[advisories]
ignore = [
    # ttf-parser is unmaintained — transitive dep via bevy, no direct control
    "RUSTSEC-2026-0192",
    # quick-xml 0.38.x — transitive dep via bevy (winit → wayland), no direct control
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Zlib",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-git = []
